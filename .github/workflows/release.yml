name: release

# Run the full pipeline (test -> build -> push) on tag pushes for releases,
# and on develop-branch pushes to exercise the whole flow before tagging.
#
# The image tag is derived from `git describe --tags`: tag v1.2.3 publishes
# ghcr.io/ctx42/dkigo-<target>:v1.2.3, while a develop push (no tag on the
# commit) publishes ghcr.io/ctx42/dkigo-<target>:<short-sha> for every target
# in C42_BLD_TARGETS (see configs/project.conf).
on:
  push:
    branches:
      - develop
    tags:
      - 'v*'

permissions:
  contents: read   # checkout
  packages: write  # push to ghcr.io

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # build.sh derives the version from `git describe --tags`, which
          # needs full history and the tags fetched.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up buildx
        # docker-container driver is required to export a mode=max layer cache.
        uses: docker/setup-buildx-action@v3

      - name: Expose the Actions cache to buildx
        # Exports ACTIONS_CACHE_URL / ACTIONS_RUNTIME_TOKEN so `--cache-to
        # type=gha` from the buildx CLI can reach the Actions cache service.
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Build and push images
        # ssh-agent gives `--ssh default` a reachable socket for the Dockerfile's
        # ssh-keyscan step; no key is required. build.sh reads C42_BLD_* to cache
        # layers across runs and push straight to ghcr.io.
        env:
          C42_BLD_CACHE: gha
          C42_BLD_PUSH: "1"
        run: |
          eval "$(ssh-agent -s)"
          ./bin/build.sh
