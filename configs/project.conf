# ==============================================================================
# Dockerfile configuration.
# ==============================================================================

# Base image for the "test" target and the "base-builder" helper stage. Needs a
# package manager (microdnf).
C42_BLD_IMG_BASE=almalinux:9.8-minimal

# Tiny runtime base for the "base" target. Ships without a package manager, so
# runtime artifacts it lacks (CA store, tini) are copied in from "base-builder".
C42_BLD_IMG_MICRO=almalinux/9-micro:9.8

# List of Dockerfile targets.
C42_BLD_TARGETS=base,test

# ==============================================================================
# Software versions to install in the Docker image.
# ==============================================================================

# The Go version to use.
#
# See https://go.dev/dl/
C42_BLD_GO_VERSION=1.26.2

# Docker client version.
#
# See https://download.docker.com/linux/static/stable/x86_64/
C42_BLD_DOCKER_CLI_VERSION=29.6.1

# Docker buildx plugin version.
#
# See https://github.com/docker/buildx/releases
C42_BLD_DOCKER_BUILDX_VERSION=v0.35.0

# The gomake version to use.
#
# See https://github.com/ctx42/gomake/blob/master/VER
C42_BLD_GOMAKE_VERSION=v0.23.0

# The gmtask version providing the gomake targets compiled into the binary.
#
# See https://github.com/ctx42/gmtask/blob/master/VER
C42_BLD_GMTASK_VERSION=v0.6.0

# The golangci-lint version to use.
#
# See https://github.com/golangci/golangci-lint/releases
C42_BLD_GOLANGCI_LINT_VERSION=v2.12.2

# The xdev version to pull the shared .golangci.yml configuration from.
#
# See https://github.com/ctx42/xdev/blob/master/VER
C42_BLD_XDEV_VERSION=v0.1.0

# The Tini version.
#
# See https://github.com/krallin/tini/releases
C42_BLD_TINI_VERSION=v0.19.0

# ==============================================================================
# Project related paths in the Docker image.
# ==============================================================================

# Root of the ctx42 custom directory.
# Holds the value of the xdef.EnvCtrRoot variable.
C42_CTR_ROOT=/ctx42

# Default GOPATH.
C42_BLD_GOPATH=$C42_CTR_ROOT/go

# Go build cache directory.
C42_BLD_GOCACHE=$C42_CTR_ROOT/go-cache

# Path to use for Go linting cache.
C42_BLD_GOLINT_CACHE=$C42_CTR_ROOT/go-cache-lint

# Where to install Go binaries when using "go install" command.
C42_BLD_GOBIN=$C42_CTR_ROOT/go-bin

# Default path for project's supporting scripts and binary files.
# Holds the value of the xdef.EnvCtrBin variable.
C42_CTR_BIN=$C42_CTR_ROOT/bin

# Default path where a project directory should be bind to.
# Holds the value of the xdef.EnvCtrProjectRoot variable.
C42_CTR_PROJECT_ROOT=$C42_CTR_ROOT/project

# Default path where a container entrypoint directory is.
# Holds the value of the xdef.EnvCtrEntrypoint variable.
C42_CTR_ENTRYPOINT=$C42_CTR_ROOT/entrypoint

# ==============================================================================
# Docker private repository.
# ==============================================================================

# Docker private repository host.
C42_REG_HOST=ghcr.io

# Docker private repository URL scheme.
C42_REG_SCHEME=https

# Docker private repository.
C42_REG_REPO=$C42_REG_HOST/ctx42

# ==============================================================================
# Go programming language configuration.
# ==============================================================================

# Defines URL to Go proxy.
#
# Example: https://proxy.golang.org
C42_GOPROXY=

# Defines the name of the checksum database.
#
# Example: sum.golang.org
C42_GOSUMDB=

# Defines Go private repository.
#
# Example: github.com/ctx42
C42_GOPRIVATE=
